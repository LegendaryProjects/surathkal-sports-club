{% extends "layout1.html" %}

{% block Title %}
Edit Match
{% endblock %}

{% block main %}
<section class="hero-panel mb-4">
    <h1 class="hero-title">Edit Scheduled Match</h1>
    <p class="hero-subtitle mb-0">{{ tournament.name }} | {{ tournament.start_date.strftime('%d %b %Y') }} to {{ tournament.end_date.strftime('%d %b %Y') }}</p>
    <div class="d-flex gap-2 flex-wrap mt-3">
        <a class="btn btn-outline-secondary" href="/events/{{ tournament.id }}">Back to Tournament</a>
    </div>
</section>

<section class="card-surface form-shell">
    <h2 class="card-title">Match Details</h2>
    <form action="/matches/{{ match.id }}/edit" method="post" class="d-grid gap-3">
        <div>
            <label class="form-label" for="team_one_id">Team 1</label>
            <select id="team_one_id" name="team_one_id" class="form-select" required>
                <option value="" disabled {% if not form_data.team_one_id %}selected{% endif %}>Select team</option>
                {% for team in teams %}
                <option value="{{ team.id }}" {% if form_data and form_data.team_one_id == team.id %}selected{% endif %}>{{ team.name }} ({{ team.sport }})</option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label class="form-label" for="team_two_id">Team 2</label>
            <select id="team_two_id" name="team_two_id" class="form-select" required>
                <option value="" disabled {% if not form_data.team_two_id %}selected{% endif %}>Select team</option>
                {% for team in teams %}
                <option value="{{ team.id }}" {% if form_data and form_data.team_two_id == team.id %}selected{% endif %}>{{ team.name }} ({{ team.sport }})</option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label class="form-label" for="match_date">Match Date</label>
            <input id="match_date" name="match_date" class="form-control" type="date" value="{{ form_data.match_date if form_data else '' }}" required>
        </div>

        <div>
            <label class="form-label" for="start_time">Start Time</label>
            <input id="start_time" name="start_time" class="form-control" type="time" value="{{ form_data.start_time if form_data else '' }}" required>
        </div>

        <div>
            <label class="form-label" for="end_time">End Time</label>
            <input id="end_time" name="end_time" class="form-control" type="time" value="{{ form_data.end_time if form_data else '' }}" required>
        </div>

        <div class="d-flex gap-2 flex-wrap">
            <button class="btn btn-accent" type="submit">Save Match</button>
            <a class="btn btn-outline-secondary" href="/events/{{ tournament.id }}">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
