{% extends "layout1.html" %}

{% block Title %}
Edit Player
{% endblock %}

{% block main %}
<section class="hero-panel mb-4">
    <h1 class="hero-title">Edit Player</h1>
    <p class="hero-subtitle mb-0">Update player, team, jersey name, jersey number, and age details.</p>
</section>

<section class="card-surface form-shell">
    <h2 class="card-title">Player Details</h2>
    <form action="/players/{{ player.id }}/edit" method="post" class="d-grid gap-3">
        <input type="hidden" name="next_url" value="{{ form_data.next_url if form_data else '' }}">

        <div>
            <label class="form-label" for="team_id">Team</label>
            <select id="team_id" name="team_id" class="form-select" required>
                <option value="" disabled {% if not form_data.team_id %}selected{% endif %}>Select team</option>
                {% for team in teams %}
                <option value="{{ team.id }}" {% if form_data and form_data.team_id == team.id %}selected{% endif %}>{{ team.name }} ({{ team.sport }})</option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label class="form-label" for="player_name">Player Name</label>
            <input id="player_name" name="player_name" class="form-control" type="text" value="{{ form_data.player_name if form_data else '' }}" required>
        </div>

        <div>
            <label class="form-label" for="player_age">Player Age</label>
            <input id="player_age" name="player_age" class="form-control" type="text" inputmode="numeric" maxlength="2" pattern="[0-9]+" value="{{ form_data.player_age if form_data else '' }}" required>
        </div>

        <div>
            <label class="form-label" for="jersey_name">Jersey Name</label>
            <input id="jersey_name" name="jersey_name" class="form-control" type="text" value="{{ form_data.jersey_name if form_data else '' }}" required>
        </div>

        <div>
            <label class="form-label" for="jersey_number">Jersey Number</label>
            <input id="jersey_number" name="jersey_number" class="form-control" type="text" inputmode="numeric" maxlength="2" pattern="[0-9]+" value="{{ form_data.jersey_number if form_data else '' }}" required>
        </div>

        <div class="d-flex gap-2 flex-wrap">
            <button class="btn btn-accent" type="submit">Save</button>
            <a class="btn btn-outline-secondary" href="{{ form_data.next_url if form_data and form_data.next_url else '/players' }}">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
