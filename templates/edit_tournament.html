{% extends "layout1.html" %}

{% block Title %}
Edit Tournament
{% endblock %}

{% block main %}
<section class="hero-panel mb-4">
    <h1 class="hero-title">Edit Tournament</h1>
    <p class="hero-subtitle mb-0">Update tournament name and date range.</p>
</section>

<section class="card-surface form-shell">
    <h2 class="card-title">Tournament Details</h2>
    <form action="/events/{{ tournament.id }}/edit" method="post" class="d-grid gap-3">
        <input type="hidden" name="next_url" value="{{ form_data.next_url if form_data else '/events/' ~ tournament.id }}">

        <div>
            <label class="form-label" for="tournament_name">Tournament Name</label>
            <input id="tournament_name" name="tournament_name" class="form-control" type="text" value="{{ form_data.tournament_name if form_data else '' }}" required>
        </div>

        <div>
            <label class="form-label" for="start_date">Start Date</label>
            <input id="start_date" name="start_date" class="form-control" type="date" value="{{ form_data.start_date if form_data else '' }}" required>
        </div>

        <div>
            <label class="form-label" for="end_date">End Date</label>
            <input id="end_date" name="end_date" class="form-control" type="date" value="{{ form_data.end_date if form_data else '' }}" required>
        </div>

        <div class="d-flex gap-2 flex-wrap">
            <button class="btn btn-accent" type="submit">Save</button>
            <a class="btn btn-outline-secondary" href="{{ form_data.next_url if form_data and form_data.next_url else '/events/' ~ tournament.id }}">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
